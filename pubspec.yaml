name: affirmation_cards
description: SBI Success Cards — A premium affirmation and vocabulary card system by Spicy Behavioral Institute for transition-age learners.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: 6.1.5+1
  shared_preferences: 2.5.3
  google_fonts: 6.2.1
  flutter_staggered_animations: 1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
